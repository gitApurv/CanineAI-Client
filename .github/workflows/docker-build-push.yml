name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: docapurv/canineai-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        shell: bash
        run: |
          bash ./scripts/push-dockerhub.sh \
            --image-name "${{ env.IMAGE_NAME }}" \
            --docker-username "${{ secrets.DOCKER_USERNAME }}" \
            --docker-token "${{ secrets.DOCKER_PASSWORD }}" \
            --vite-api-base-url "${{ secrets.VITE_API_BASE_URL }}" \
            --vite-cloudinary-cloud "${{ secrets.VITE_CLOUDINARY_CLOUD }}" \
            --vite-cloudinary-upload-preset "${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}"
